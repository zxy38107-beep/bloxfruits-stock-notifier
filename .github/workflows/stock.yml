name: Blox Fruits Stock Check

on:
  schedule:
    - cron: "*/5 * * * *"   # Every 5 minutes - reduces max delay to \~5-7 min
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: bloxfruits-stock-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run stock notifier
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PING_TARGET: ${{ secrets.PING_TARGET }}
        run: python stock_notifier.py --once

      - name: Commit updated state (only if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- state.json; then
            git add state.json
            git commit -m "chore: update stock state [skip ci]"
            git push || echo "Push transient; next run recovers."
          else
            echo "No stock change."
          fi
