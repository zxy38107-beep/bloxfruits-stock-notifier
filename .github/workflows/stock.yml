name: Blox Fruits Stock Check

on:
  schedule:
    - cron: "*/10 * * * *"  # Every 10 minutes - matches your healthchecks Period
  workflow_dispatch: {}  # Manual trigger for testing

permissions:
  contents: write

concurrency:
  group: bloxfruits-stock-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run stock notifier with retries
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PING_TARGET: ${{ secrets.PING_TARGET }}
        run: |
          for attempt in {1..3}; do
            echo "=== Attempt $attempt ==="
            if python stock_notifier.py --once; then
              echo "Stock check completed successfully."
              break
            else
              echo "Attempt $attempt failed. Retrying in 15s..."
              sleep 15
            fi
          done || echo "Retries exhausted. Continuing to healthcheck."

      - name: Commit updated state (only if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- state.json; then
            git add state.json
            git commit -m "chore: update stock state [skip ci]"
            git push || echo "Push transient; next run recovers."
          else
            echo "No stock change. No commit."
          fi

      - name: Ping Healthchecks.io (Success)
        if: success()
        run: |
          curl -m 10 --retry 5 -fsS -o /dev/null "${{ secrets.HEALTHCHECK_PING_URL }}"

      - name: Ping Healthchecks.io (Failure)
        if: failure()
        run: |
          curl -m 10 --retry 5 -fsS -o /dev/null "${{ secrets.HEALTHCHECK_PING_URL }}/fail"
